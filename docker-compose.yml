services:
  server:
    build: ./server
    container_name: bili-server
    ports:
      - "1658:1658"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build: ./project
    container_name: bili-frontend
    ports:
      - "1659:1659"
    environment:
      - VITE_API_TARGET=http://server:1658
    depends_on:
      - server
    restart: unless-stopped
